name: paper_suitecase
description: "A Flutter desktop application for managing academic PDF papers with hierarchical tagging and arXiv integration."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.10.1

dependencies:
  flutter:
    sdk: flutter

  # Icons
  cupertino_icons: ^1.0.8

  # Drag and drop for desktop
  desktop_drop: ^0.7.0
  cross_file: ^0.3.5+1

  # SQLite database for desktop
  sqflite_common_ffi: ^2.4.0+2
  path: ^1.9.1
  path_provider: ^2.1.5

  # PDF text extraction
  syncfusion_flutter_pdf: ^24.2.8

  # PDF Viewer - Syncfusion with proper APIs
  syncfusion_flutter_pdfviewer: ^24.2.8

  # HTTP for arXiv API
  http: ^1.6.0
  xml: ^6.6.1

  # State management
  provider: ^6.1.5+1

  # Open files with system apps
  url_launcher: ^6.3.2

  # Window sizing
  window_manager: ^0.5.1
  pdf_render: ^1.4.12
  image: ^4.7.2

  # File picker for settings
  file_selector: ^1.0.3
  shared_preferences: ^2.2.2
  html_unescape: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^6.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

